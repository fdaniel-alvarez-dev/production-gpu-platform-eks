global:
  domain: argocd.example.com

configs:
  params:
    server.insecure: "false"
    application.instanceLabelKey: argocd.argoproj.io/instance
  cm:
    timeout.reconciliation: 60s
    resource.exclusions: |
      - apiGroups:
        - "nvidia.com"
        kinds:
        - "ClusterPolicy"
  rbac:
    policy.default: role:readonly

server:
  replicas: 2
  ingress:
    enabled: false

controller:
  replicas: 1

repoServer:
  replicas: 2

applicationSet:
  replicas: 2

redis:
  enabled: true

dex:
  enabled: false
