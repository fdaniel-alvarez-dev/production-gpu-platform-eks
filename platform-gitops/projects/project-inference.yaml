apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: inference
  namespace: argocd
spec:
  description: Inference workloads and gateways
  sourceRepos:
    - https://github.com/fdaniel-alvarez-dev/production-gpu-platform-eks.git
  destinations:
    - namespace: inference-gateway
      server: https://kubernetes.default.svc
    - namespace: inference
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
