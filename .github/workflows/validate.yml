name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq gettext-base
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz | tar -xz
          sudo mv kustomize /usr/local/bin/kustomize
          python -m pip install pyyaml
      - name: Render bootstrap
        run: REPO_URL=https://github.com/${{ github.repository }}.git bash ./scripts/render_bootstrap.sh
      - name: Validate Terraform
        run: bash ./scripts/validate_terraform.sh
      - name: Validate manifests
        run: bash ./scripts/validate_manifests.sh
      - name: Validate Python
        run: python -m compileall apps scripts
