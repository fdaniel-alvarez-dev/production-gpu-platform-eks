apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-platform
  namespace: argocd
spec:
  project: platform-core
  source:
    repoURL: https://github.com/fdaniel-alvarez-dev/production-gpu-platform-eks.git
    targetRevision: main
    path: platform-gitops/clusters/prod-us-east-1
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
