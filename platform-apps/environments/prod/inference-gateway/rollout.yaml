apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: inference-gateway
  namespace: inference-gateway
spec:
  replicas: 4
  selector:
    matchLabels:
      app: inference-gateway
  strategy:
    canary:
      stableService: inference-gateway-stable
      canaryService: inference-gateway-canary
      steps:
        - setWeight: 5
        - pause: { duration: 5m }
        - analysis:
            templates:
              - templateName: inference-latency-check
        - setWeight: 25
        - pause: { duration: 10m }
        - setWeight: 50
        - pause: {}
        - setWeight: 100
  template:
    metadata:
      labels:
        app: inference-gateway
        team: platform
        workload-type: gpu-inference
        model-name: baseline-serving
    spec:
      nodeSelector:
        workload-type: gpu-inference
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: inference
          effect: NoSchedule
      containers:
        - name: inference-gateway
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/gpu-platform/prod/inference-gateway:sha-REPLACE_ME
          ports:
            - containerPort: 8080
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "2"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
