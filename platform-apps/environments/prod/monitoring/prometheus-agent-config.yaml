apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-agent-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
    remote_write:
      - url: https://aps-workspaces.us-east-1.amazonaws.com/workspaces/ws-REPLACE_ME/api/v1/remote_write
        sigv4:
          region: us-east-1
    scrape_configs:
      - job_name: dcgm
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [gpu-operator]
